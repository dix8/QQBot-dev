name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (不带 v 前缀，如 0.4.5)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  # ── Windows 便携包构建 ──────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            server/pnpm-lock.yaml
            web/pnpm-lock.yaml

      - name: Build portable package
        shell: bash
        run: bash scripts/build-win.sh

      - name: Create zip
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          cd release
          7z a -tzip "../QQBot-${VERSION}-windows-x64.zip" QQBot/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: QQBot-*-windows-x64.zip

  # ── Docker 镜像构建 & 推送 ─────────────────────
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── 创建 GitHub Release ────────────────────────
  create-release:
    needs: [build-windows, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ inputs.version != '' && format('v{0}', inputs.version) || github.ref_name }}"

          # 找到上一个 tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # 按 conventional commit 分类
          FEATS=$(git log "$RANGE" --pretty=format:"%s" | grep -iE "^feat(\(.+\))?:" | sed 's/^[^:]*: /- /' || true)
          FIXES=$(git log "$RANGE" --pretty=format:"%s" | grep -iE "^fix(\(.+\))?:" | sed 's/^[^:]*: /- /' || true)
          OTHERS=$(git log "$RANGE" --pretty=format:"%s" | grep -viE "^(feat|fix|docs|chore|ci|test|refactor)(\(.+\))?:" || true)
          CHORES=$(git log "$RANGE" --pretty=format:"%s" | grep -iE "^(chore|ci|refactor|docs|test)(\(.+\))?:" | sed 's/^[^:]*: /- /' || true)

          {
            echo "body<<RELEASE_EOF"
            if [ -n "$FEATS" ]; then
              echo "## ✨ 新功能"
              echo "$FEATS"
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "## 🐛 修复"
              echo "$FIXES"
              echo ""
            fi
            if [ -n "$CHORES" ]; then
              echo "## 🔧 其他"
              echo "$CHORES"
              echo ""
            fi
            if [ -z "$FEATS" ] && [ -z "$FIXES" ] && [ -z "$CHORES" ]; then
              echo "维护性更新。"
              echo ""
            fi
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: windows-portable

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version != '' && format('v{0}', inputs.version) || github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ contains(inputs.version || github.ref_name, '-') }}
          files: QQBot-*-windows-x64.zip
